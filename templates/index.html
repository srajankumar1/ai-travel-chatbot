<!DOCTYPE html>
<html>

<head>
    <title>WanderAI</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>

        :root {
            --sky: #0a1628;
            --ocean: #0d2b4e;
            --accent: #f5a623;
            --glow: #38bdf8;
            --soft: #e0f2fe;
            --glass: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--sky);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 50% at 20% 80%, rgba(56,189,248,0.15) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 20%, rgba(245,166,35,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 100% 80% at 50% 50%, #0a1628 0%, #050e1c 100%);
            z-index: 0;
        }

        /* Stars */
        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--d, 3s) ease-in-out infinite;
            opacity: var(--o, 0.6);
        }
        @keyframes twinkle {
            0%, 100% { opacity: var(--o, 0.6); transform: scale(1); }
            50% { opacity: 0.1; transform: scale(0.5); }
        }

        /* Floating plane */
        .plane {
            position: fixed;
            top: 12%;
            left: -60px;
            font-size: 28px;
            animation: fly 18s linear infinite;
            z-index: 0;
            filter: drop-shadow(0 0 8px rgba(56,189,248,0.6));
        }
        @keyframes fly {
            0% { left: -60px; top: 12%; }
            100% { left: calc(100vw + 60px); top: 8%; }
        }

        /* Main container */
        .container {
            position: relative;
            z-index: 1;
            width: 520px;
            border-radius: 24px;
            overflow: hidden;
            background: rgba(13, 43, 78, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            box-shadow:
                0 0 0 1px rgba(56,189,248,0.08),
                0 32px 80px rgba(0,0,0,0.6),
                0 0 120px rgba(56,189,248,0.05) inset;
            animation: rise 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes rise {
            from { opacity: 0; transform: translateY(40px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #0f3460 0%, #0d2b4e 50%, #0a1f3d 100%);
            padding: 22px 24px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }
        .header::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--glow), transparent);
        }
        .header-emoji {
            font-size: 32px;
            display: block;
            margin-bottom: 6px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: white;
            letter-spacing: 0.5px;
            line-height: 1.2;
        }
        .header p {
            font-size: 12px;
            color: var(--glow);
            margin-top: 4px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Destinations strip */
        .destinations {
            display: flex;
            gap: 6px;
            padding: 10px 16px;
            overflow-x: auto;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border);
            scrollbar-width: none;
        }
        .destinations::-webkit-scrollbar { display: none; }
        .dest-chip {
            flex-shrink: 0;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .dest-chip:hover {
            background: rgba(56,189,248,0.15);
            border-color: var(--glow);
            color: var(--glow);
            transform: translateY(-1px);
        }

        /* Chat area */
        .chat-box {
            height: 360px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scrollbar-width: thin;
            scrollbar-color: rgba(56,189,248,0.3) transparent;
        }
        .chat-box::-webkit-scrollbar { width: 4px; }
        .chat-box::-webkit-scrollbar-track { background: transparent; }
        .chat-box::-webkit-scrollbar-thumb { background: rgba(56,189,248,0.3); border-radius: 4px; }

        .message {
            padding: 11px 15px;
            border-radius: 16px;
            max-width: 82%;
            font-size: 14.5px;
            line-height: 1.55;
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            position: relative;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.92) translateY(8px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* User message */
        .user {
            background: linear-gradient(135deg, #0369a1, #0284c7);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(3,105,161,0.4);
        }

        /* Bot message */
        .bot {
            background: rgba(255,255,255,0.07);
            color: rgba(255,255,255,0.92);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            backdrop-filter: blur(8px);
        }
        .bot-label {
            font-size: 10px;
            color: var(--glow);
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .bot-label::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--glow);
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        /* Typing indicator */
        .typing {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 14px 16px;
        }
        .typing span {
            width: 7px; height: 7px;
            background: var(--glow);
            border-radius: 50%;
            animation: bounce 1.2s ease-in-out infinite;
            opacity: 0.7;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            40% { transform: translateY(-8px); opacity: 1; }
        }

        /* Input area */
        .input-area {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 16px;
            background: rgba(0,0,0,0.25);
            border-top: 1px solid var(--border);
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: rgba(255,255,255,0.06);
            color: white;
            font-size: 14px;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: all 0.25s;
            backdrop-filter: blur(8px);
        }
        input[type="text"]::placeholder { color: rgba(255,255,255,0.3); }
        input[type="text"]:focus {
            border-color: var(--glow);
            background: rgba(56,189,248,0.06);
            box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
        }

        button {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #f5a623, #e8920f);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(245,166,35,0.35);
            font-size: 18px;
        }
        button:hover {
            transform: scale(1.08) rotate(5deg);
            box-shadow: 0 6px 20px rgba(245,166,35,0.5);
        }
        button:active {
            transform: scale(0.96);
        }

    </style>
</head>

<body>

    <!-- Stars background -->
    <div class="stars" id="stars"></div>

    <!-- Flying plane -->
    <div class="plane">✈️</div>

    <div class="container">

        <div class="header">
            <span class="header-emoji">🌍</span>
            <h1>AI Travel Guide</h1>
            <p>Your world. Your adventure.</p>
        </div>

        <!-- Quick destination chips -->
        <div class="destinations">
            <div class="dest-chip" onclick="quickAsk('Best places to visit in Bengaluru')">🚉 Bengaluru</div>
            <div class="dest-chip" onclick="quickAsk('Top things to do in Mysore')">🐘 Mysore</div>
            <div class="dest-chip" onclick="quickAsk('Best beaches in Udupi')">🏝 Udupi</div>
            <div class="dest-chip" onclick="quickAsk('Travel tips for Manali')">🏔️ Manali</div>
            <div class="dest-chip" onclick="quickAsk('Hidden gems in Kerala')">🌴 Kerala</div>
            <div class="dest-chip" onclick="quickAsk('Best time to visit Lakshadweep')">🐚 Lakshadweep</div>
            <div class="dest-chip" onclick="quickAsk('Backpacking tips for Dubai')">🐪 Dubai</div>
        </div>

        <div class="chat-box" id="chatBox">
            <div class="message bot">
                <div class="bot-label">AI Guide</div>
                Hello, explorer! 🌟 Ask me about destinations, travel tips, best times to visit, or hidden gems anywhere in the world. ✈️
            </div>
        </div>

        <div class="input-area">
            <input
                type="text"
                id="userInput"
                placeholder="Ask about any destination..."
                onkeydown="if(event.key==='Enter') sendMessage()"
            >
            <button onclick="sendMessage()" title="Send">
                🚀
            </button>
        </div>

    </div>

    <script>

        // Generate stars
        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 120; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            s.style.cssText = `
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                --d: ${2 + Math.random() * 4}s;
                --o: ${0.2 + Math.random() * 0.8};
                width: ${Math.random() > 0.85 ? 3 : 2}px;
                height: ${Math.random() > 0.85 ? 3 : 2}px;
                animation-delay: ${Math.random() * 4}s;
            `;
            starsEl.appendChild(s);
        }

        // Quick ask from chips
        function quickAsk(text) {
            document.getElementById('userInput').value = text;
            sendMessage();
        }

        async function sendMessage() {
            let input = document.getElementById("userInput");
            let message = input.value;
            if (message.trim() === "") return;

            let chatBox = document.getElementById("chatBox");

            // User message
            let userDiv = document.createElement("div");
            userDiv.className = "message user";
            userDiv.innerText = message;
            chatBox.appendChild(userDiv);

            input.value = "";

            // Typing indicator
            let typingDiv = document.createElement("div");
            typingDiv.className = "message bot typing";
            typingDiv.innerHTML = '<span></span><span></span><span></span>';
            chatBox.appendChild(typingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;

            // Send to Flask backend — connection unchanged
            let response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            });

            let data = await response.json();

            // Remove typing indicator
            chatBox.removeChild(typingDiv);

            // Bot message
            let botDiv = document.createElement("div");
            botDiv.className = "message bot";
            botDiv.innerHTML = `<div class="bot-label">AI Guide</div>${data.reply}`;
            chatBox.appendChild(botDiv);

            chatBox.scrollTop = chatBox.scrollHeight;
        }

    </script>

</body>
</html>
